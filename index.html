<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            text-align: center;
            margin-left: auto;
            margin-right: auto;
            margin-top: 120px;

            background-image:url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcThxoRQ27n8gUCQsEyoxCTfmCkBbnbAUunVBg&s) ;
            background-size: cover;
        }
        .col{
            background-color: rgb(145, 91, 14);
            border-radius: 40px;
            color: white; 
            padding: 50px;
            margin-right: 40px;
            opacity: 1.0;
            text-align: center;
        }
        label{

            color: rgb(255, 255, 255);
            border-radius: 10px;
            font-family: Gill Sans MT, sans;
        }
    </style>
</head>
<body>

    <div class="col">
    <h1>Heats Checker</h1>
    <details>
  <summary>Help</summary>
  <p>Put in the Heat and Temperature to calculate for if you are about to burn or if you are gonna be comfortably fine in this weather.</p>
</details>
    <br>
    <button class="btn btn-success" onclick="Heater()">Heater</button>
    <br><br>
    <label>Temperature</label>
    <br>
    <input id="temp" type="number">
    <br><br>
    <label>Humidity</label>
    <br>
    <input id="humid" type="number">
</div>
    <script>
            function Heater() {
                let temp, humidity, HI, status
                temp = parseFloat(document.getElementById("temp").value);
                humidity = parseFloat(document.getElementById("humid").value);
                HI = temp + (0.33 * humidity) - 4;

                status = ""; 
                switch(true) {
                    case (HI <= 27):
                    status = "Comfortable / Cool";
                    break;
                    case (HI <= 32):
                    status = "Warm";
                    break;
                    case (HI <= 37):
                    status = "Hot";
                    break;
                    case (HI <= 41):
                    status = "Caution";
                    break;
                    case (HI <= 42):
                    status = "DANGERR!!!!";
                    break;
                    default:
                    status = "EXTREME DANGER!";
                }
                alert(status);
            }

    </script>
</body>
</html>
